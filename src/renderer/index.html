<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xtream Control</title>
    <script type="module" src="/control.ts"></script>
  </head>
  <body>
    <main class="app-shell">
      <aside class="nav-rail" aria-label="Primary">
        <div class="brand-mark">XT</div>
        <nav class="rail-items" aria-label="Xtream surfaces">
          <button id="patchRailButton" class="rail-item active" type="button" aria-current="page"></button>
          <button id="streamRailButton" class="rail-item" type="button"></button>
          <button id="performanceRailButton" class="rail-item" type="button"></button>
          <button id="configRailButton" class="rail-item" type="button"></button>
        </nav>
      </aside>

      <div class="app-frame">
        <section id="surfaceMount" class="surface-mount" aria-label="Active surface">
          <section id="patchSurface" class="patch-surface" aria-label="Patch surface">
          <header class="top-bar patch-top-bar">
            <div class="top-bar-main">
              <div class="timecode patch-timecode" id="timecode">00:00.000</div>
              <div class="patch-header-center">
                <div class="patch-transport transport-cluster" aria-label="Transport controls">
                  <button id="playButton" type="button" class="icon-button">Play</button>
                  <button id="pauseButton" type="button" class="icon-button secondary">Pause</button>
                  <button id="stopButton" type="button" class="icon-button secondary">Stop</button>
                  <div class="loop-control">
                    <button id="loopToggleButton" type="button" class="icon-button secondary">Loop</button>
                    <div id="loopPopover" class="loop-popover" hidden role="dialog" aria-label="Loop range">
                    <div class="loop-popover-row">
                      <label class="loop-field">
                        <span class="loop-field-label">Loop start</span>
                        <input id="loopStartInput" class="loop-time-input" type="text" value="00:00.000" autocomplete="off" spellcheck="false" />
                      </label>
                      <label class="loop-field">
                        <span class="loop-field-label">Loop end</span>
                        <input id="loopEndInput" class="loop-time-input" type="text" autocomplete="off" spellcheck="false" />
                      </label>
                      <button id="loopActivateButton" class="loop-activate-toggle" type="button" aria-pressed="false">
                        Activate
                      </button>
                    </div>
                    </div>
                  </div>
                  <button id="rateDisplayButton" type="button">1.0x</button>
                </div>
                <div class="timeline-meta patch-timeline-meta" aria-live="polite">
                  <div id="timelineSummaryPrimary" class="timeline-summary-primary">No active timeline duration</div>
                  <div id="timelineLoopLimitLine" class="timeline-summary-loop" hidden></div>
                </div>
              </div>
              <div class="utility-cluster patch-header-utilities" aria-label="Show utilities">
                <button id="saveShowButton" type="button">Save</button>
                <button id="saveShowAsButton" type="button">Save As</button>
                <button id="openShowButton" type="button">Open</button>
                <button id="createShowButton" type="button">Create Show</button>
                <span id="liveState" class="status-chip" aria-live="polite">Standby</span>
              </div>
            </div>
            <div class="timeline-control">
              <input id="timelineScrubber" class="mini-slider timeline-slider" type="range" min="0" max="0" step="0.01" value="0" aria-label="Timeline scrubber" />
            </div>
          </header>

          <section class="workspace" aria-label="Patch workspace">
            <section id="mediaPoolPanel" class="panel media-pool" aria-labelledby="mediaPoolHeading">
              <div class="panel-header">
                <h2 id="mediaPoolHeading">Media Pool</h2>
                <div class="panel-header-actions">
                  <button id="addVisualsButton" type="button">Add Media</button>
                  <button id="visualPoolLayoutToggleButton" type="button" class="icon-button" hidden aria-pressed="false"></button>
                </div>
              </div>
              <div class="media-pool-main">
                <div class="pool-tabs" role="tablist" aria-label="Media pool tabs">
                  <button id="visualTabButton" class="pool-tab active" type="button" role="tab" aria-selected="true">Visuals</button>
                  <button id="audioTabButton" class="pool-tab" type="button" role="tab" aria-selected="false">Audio</button>
                </div>
                <div class="pool-toolbar">
                  <label>
                    <span class="sr-only">Search media pool</span>
                    <input id="poolSearchInput" type="search" placeholder="Search media" />
                  </label>
                  <button
                    id="liveGridPreviewToggleButton"
                    type="button"
                    class="icon-button pool-toolbar-icon"
                    hidden
                    aria-pressed="true"
                    aria-label="Live previews in grid"
                  ></button>
                  <select id="poolSortSelect" aria-label="Sort media pool">
                    <option value="label">Label</option>
                    <option value="duration">Duration</option>
                    <option value="status">Status</option>
                  </select>
                </div>
                <div id="mediaListRegion" class="media-list-region drop-target">
                  <div id="visualList" class="visual-list-mount">
                    <div id="visualListList" class="visual-list"></div>
                    <div id="visualListGrid" class="visual-list visual-list--grid" hidden></div>
                  </div>
                  <div id="audioPanel" class="audio-panel"></div>
                </div>
              </div>
            </section>

            <div id="workspaceSplitter" class="splitter vertical" role="separator" aria-orientation="vertical" aria-label="Resize media and display panes" aria-valuemin="260" aria-valuemax="1200" aria-valuenow="400" tabindex="0"></div>

            <section class="panel display-workspace" aria-labelledby="displayWorkspaceHeading">
              <div class="panel-header">
                <h2 id="displayWorkspaceHeading">Display Windows</h2>
                <div class="button-row">
                  <button id="createDisplayButton" type="button">Add</button>
                </div>
              </div>
              <div id="displayList" class="display-list" aria-live="polite"></div>
            </section>
          </section>

          <div id="mainFooterSplitter" class="splitter horizontal" role="separator" aria-orientation="horizontal" aria-label="Resize workspace and footer" aria-valuemin="180" aria-valuemax="800" aria-valuenow="220" tabindex="0"></div>

          <section class="operator-footer" aria-label="Mixer and details">
            <section class="panel mixer-panel" aria-labelledby="mixerHeading">
              <div class="panel-header">
                <h2 id="mixerHeading">Audio Mixer</h2>
                <div class="button-row">
                  <button id="createOutputButton" type="button">Create Output</button>
                  <button id="expandMixerButton" class="secondary" type="button">Expand Mixer</button>
                </div>
              </div>
              <div id="outputPanel" class="output-panel"></div>
            </section>

            <div id="footerSplitter" class="splitter vertical" role="separator" aria-orientation="vertical" aria-label="Resize mixer and details panes" aria-valuemin="260" aria-valuemax="1200" aria-valuenow="500" tabindex="0"></div>

            <section class="panel details-panel" aria-labelledby="detailsHeading">
              <div class="panel-header">
                <h2 id="detailsHeading">Patch Summary</h2>
                <div id="showStatus" class="hint detail-status" aria-live="polite">No show config saved this session.</div>
              </div>
              <div class="details-body">
                <div id="issueList" class="issue-list"></div>
                <div id="detailsContent" class="details-content"></div>
              </div>
            </section>
          </section>
          </section>

          <section id="surfacePanel" class="surface-panel" aria-live="polite" hidden></section>

          <footer class="status-footer" aria-label="Global operator controls">
            <span id="runtimeVersionLabel">Xtream runtime</span>
            <span class="status-actions">
              <button id="globalAudioMuteButton" class="secondary" type="button">Audio Mute</button>
              <button id="displayBlackoutButton" class="secondary" type="button">Display Blackout</button>
              <button id="performanceModeButton" class="secondary" type="button">Performance Mode</button>
              <button id="clearSoloButton" class="secondary" type="button">Clear Solo</button>
              <button id="displayIdentifyFlashButton" class="secondary" type="button">Show Display Labels</button>
              <button id="resetMetersButton" class="secondary" type="button">Reset Meters</button>
              <button id="refreshOutputsButton" class="secondary" type="button">Refresh Outputs</button>
            </span>
          </footer>
        </section>

        <div id="workspacePresentationOverlay" class="workspace-presentation-overlay" aria-hidden="true">
          <div class="workspace-presentation-overlay-scrim"></div>
          <div class="workspace-presentation-overlay-center">
            <div class="presentation-loading-status">Loading show…</div>
          </div>
        </div>

        <section id="launchDashboard" class="launch-dashboard" aria-labelledby="launchDashboardHeading" role="dialog" aria-modal="true">
          <div class="launch-panel">
            <div class="launch-header">
              <h1 id="launchDashboardHeading">Show Time!</h1>
            </div>
            <div class="launch-actions" aria-label="Launch actions">
              <button id="launchOpenShowButton" class="launch-action" type="button">Open Existing</button>
              <button id="launchCreateShowButton" class="launch-action" type="button">Create New</button>
              <button id="launchOpenDefaultButton" class="launch-action" type="button">Open Default</button>
            </div>
            <div class="launch-recents">
              <div class="launch-recents-heading">Recent Shows</div>
              <div id="launchRecentList" class="launch-recent-list" aria-live="polite"></div>
            </div>
            <div id="launchLoadingOverlay" class="launch-loading-overlay" aria-hidden="true">
              <div class="launch-loading-overlay-scrim"></div>
              <div class="launch-loading-overlay-center">
                <div class="launch-loading-status">Loading show…</div>
              </div>
            </div>
          </div>
        </section>

        <section id="extractionOverlay" class="extraction-overlay" aria-labelledby="extractionOverlayHeading" role="dialog" aria-modal="true" hidden>
          <div class="extraction-panel">
            <div class="extraction-header">
              <h1 id="extractionOverlayHeading">Extracting Audio</h1>
              <div id="extractionOverlayStatus" class="extraction-status">Working</div>
            </div>
            <div id="extractionOverlayMessage" class="extraction-message" aria-live="polite"></div>
            <pre id="extractionOverlayError" class="extraction-error" hidden></pre>
            <div id="extractionOverlayActions" class="extraction-actions"></div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
